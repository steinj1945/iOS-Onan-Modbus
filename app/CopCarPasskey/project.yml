# XcodeGen project definition
# Run: xcodegen generate
# https://github.com/yonaskolb/XcodeGen

name: CopCarPasskey
options:
  bundleIdPrefix: net.dtgllc.CopCar
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"

targets:
  CopCarPasskey:
    type: application
    platform: iOS
    info:
      path: CopCarPasskey/Info.plist
    sources:
      - CopCarPasskey
      - CopCarPasskeyShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.copcar.passkey
        SWIFT_VERSION: "5.9"
    capabilities:
      bluetooth-peripheral: {}
      bluetooth-central: {}
