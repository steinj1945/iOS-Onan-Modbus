name: iOS App

on:
  push:
    branches: [main]
    paths: ["app/CopCarPasskey/**", ".github/workflows/ios.yml"]
  pull_request:
    branches: [main]
    paths: ["app/CopCarPasskey/**", ".github/workflows/ios.yml"]

env:
  PROJECT_DIR: app/CopCarPasskey
  SCHEME: CopCarPasskey
  IOS_DESTINATION: "platform=iOS Simulator,name=iPhone 17 Pro"
  WATCHOS_DESTINATION: "platform=watchOS Simulator,name=Apple Watch Series 11 (46mm)"

jobs:
  build:
    name: Build (iOS + watchOS)
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: Build iOS target
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project CopCarPasskey.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -destination "${{ env.IOS_DESTINATION }}" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Archive iOS app
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project CopCarPasskey.xcodeproj \
            -scheme "${{ env.SCHEME }}" \
            -destination "generic/platform=iOS" \
            -archivePath "${{ runner.temp }}/CopCarPasskey.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Package IPA
        run: |
          mkdir -p "${{ runner.temp }}/Payload"
          cp -r "${{ runner.temp }}/CopCarPasskey.xcarchive/Products/Applications/CopCarPasskey.app" \
                "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}"
          zip -r CopCarPasskey.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CopCarPasskey-${{ github.sha }}
          path: ${{ runner.temp }}/CopCarPasskey.ipa
          retention-days: 14